# OpenEnv Configuration — Email Rectifier AI Triage Environment
# Defines the OpenEnv-compatible RL environment for AI email triage.

name: email-rectifier-openenv
version: "3.0.0"
description: >
  OpenEnv-compatible reinforcement learning environment for AI-driven
  email classification, prioritization, and decision-making. The agent
  processes inbox emails and takes structured actions (classify, prioritize,
  act) based on email content. Supports three task difficulties: easy
  (spam detection), medium (category + priority), and hard (full triage).

# ── Environment Specification ────────────────────────────────────────────────

environment:
  type: email_triage_rl
  module: email_rectifier.EmailEnv

  # Observation space: what the agent observes
  observation_space:
    current_email:
      email_id: string
      subject: string
      body: string
      sender: string
      current_state: string  # pending | processed
    step_number: int
    total_emails: int
    processed_count: int
    remaining_count: int
    episode_done: bool
    total_reward: float
    task_id: string

  # Action space: what the agent submits
  action_space:
    type: structured
    schema:
      category:
        type: string
        enum: [spam, support, sales, personal, financial, professional,
               educational, travel, healthcare, government, transactional,
               promotional, social, system, community, service]
      priority:
        type: string
        enum: [low, medium, high]
      action_type:
        type: string
        enum: [ignore, reply, escalate]
      reply_text:
        type: string
        optional: true

  # Reward specification
  reward:
    type: float
    range: [-1.0, 1.5]
    per_step: true
    components:
      - name: category_score
        description: "Points for correct category classification"
      - name: priority_score
        description: "Points for correct priority assignment"
      - name: action_score
        description: "Points for correct action type"
      - name: reply_bonus
        description: "Bonus for quality reply text (hard task only)"
      - name: penalty
        description: "Penalty for errors (e.g., ignoring high-priority)"

  # Episode logic
  episode:
    start: "reset() loads 20 deterministic emails"
    termination:
      - "All emails processed"
      - "Max 25 steps reached"
    max_steps: 25

# ── API Server Configuration ─────────────────────────────────────────────────

api:
  framework: fastapi
  entrypoint: api_server:app
  port: 7860
  endpoints:
    health:
      method: GET
      path: /
      description: "Health check — returns HTTP 200"
    reset:
      method: POST
      path: /reset
      description: "Reset environment with task_id (easy|medium|hard)"
      request_body:
        task_id: string
    step:
      method: POST
      path: /step
      description: "Submit action for current email"
      request_body:
        action:
          category: string
          priority: string
          action_type: string
          reply_text: string  # optional
    state:
      method: GET
      path: /state
      description: "Get current environment observation"
    tasks:
      method: GET
      path: /tasks
      description: "List available tasks"

# ── Evaluation Tasks ─────────────────────────────────────────────────────────

tasks:
  - name: easy
    display_name: "Spam Detection"
    description: "Binary classification: spam vs non-spam"
    difficulty: easy
    grader: grader.EasyGrader
    samples: 20
    scoring: "1.0 for correct, 0.0 for incorrect"

  - name: medium
    display_name: "Category + Priority Classification"
    description: "Classify email category and priority level"
    difficulty: medium
    grader: grader.MediumGrader
    samples: 20
    scoring: "Category correct → +0.6, Priority correct → +0.4"

  - name: hard
    display_name: "Full Email Triage"
    description: "Full triage: category + priority + action + optional reply"
    difficulty: hard
    grader: grader.HardGrader
    samples: 20
    scoring: "Category → +0.4, Priority → +0.3, Action → +0.3, Reply bonus → +0.1"

# ── Inference Configuration ──────────────────────────────────────────────────

inference:
  script: inference.py
  runtime: "<20 minutes on 2 vCPU, 8GB RAM"
  environment_variables:
    - API_BASE_URL
    - MODEL_NAME
    - HF_TOKEN
    - OPENAI_API_KEY
  output_format:
    start: "[START]"
    step: "[STEP]"
    end: "[END]"

# ── Docker Configuration ─────────────────────────────────────────────────────

docker:
  dockerfile: Dockerfile
  base_image: python:3.10-slim
  port: 7860
